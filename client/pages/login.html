<!DOCTYPE html>
<html lang="pt-ao" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Angola Imóveis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .login-container {
            padding-top: 60px;
        }
        .form-control-custom {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 16px;
            color: white;
            padding: 15px 20px;
            margin-bottom: 20px;
        }
        .form-control-custom:focus {
            background: #252525;
            border-color: var(--neon-lime);
            box-shadow: none;
            color: white;
        }
        .back-btn {
            width: 45px;
            height: 45px;
            background: #1e1e1e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            margin-bottom: 30px;
        }
    </style>
</head>
<body class="bg-dark">

    <div class="container-mobile p-4 login-container">
        
        <a href="../index.html" class="back-btn">
            <i class="bi bi-chevron-left"></i>
        </a>

        <div class="mb-5">
            <h1 class="fw-bold">Bem-vindo de volta!</h1>
            <p class="text-secondary">Faça login para gerenciar seus imóveis e encontrar novas oportunidades.</p>
        </div>

        <div id="alertPlaceholder"></div>

        <form id="loginForm">
            <div class="mb-1">
                <label class="small text-secondary mb-2 ms-1">E-mail</label>
                <input type="email" id="email" class="form-control form-control-custom" placeholder="exemplo@email.com" required>
            </div>

            <div class="mb-1">
                <label class="small text-secondary mb-2 ms-1">Palavra-passe</label>
                <div class="position-relative">
                    <input type="password" id="password" class="form-control form-control-custom" placeholder="Sua senha" required>
                </div>
            </div>

            <div class="text-end mb-4">
                <a href="#" class="text-neon-link small text-decoration-none">Esqueceu a senha?</a>
            </div>

            <button type="submit" id="btnLogin" class="btn btn-primary-neon w-100 py-3 rounded-4 fw-bold mb-4">
                Entrar
            </button>

            <div class="text-center">
                <p class="text-secondary">Não tem uma conta? 
                    <a href="register.html" class="text-neon-link fw-bold text-decoration-none">Registe-se</a>
                </p>
            </div>
        </form>

        <!-- Social Login (Visual apenas) -->
        <div class="mt-5">
            <div class="d-flex align-items-center mb-4">
                <hr class="flex-grow-1 border-secondary">
                <span class="px-3 text-secondary small">Ou entre com</span>
                <hr class="flex-grow-1 border-secondary">
            </div>

            <div class="d-flex gap-3">
                <button class="btn btn-dark-outline flex-grow-1 py-3 rounded-4">
                    <i class="bi bi-google me-2"></i> Google
                </button>
                <button class="btn btn-dark-outline flex-grow-1 py-3 rounded-4">
                    <i class="bi bi-apple me-2"></i> Apple
                </button>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btnLogin');
            const alertPlaceholder = document.getElementById('alertPlaceholder');

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> A entrar...';

            try {
                const response = await apiService.auth.login({ email, password });

                if (response.success) {
                    // Salvar Token e Dados do Usuário
                    localStorage.setItem('token', response.user.token);
                    localStorage.setItem('user', JSON.stringify(response.user));
                    
                    window.location.href = '../index.html';
                } else {
                    alertPlaceholder.innerHTML = `
                        <div class="alert alert-danger border-0 bg-danger bg-opacity-10 text-danger rounded-4">
                            <i class="bi bi-exclamation-circle me-2"></i> ${response.message}
                        </div>
                    `;
                }
            } catch (error) {
                console.error(error);
            } finally {
                btn.disabled = false;
                btn.innerText = 'Entrar';
            }
        });
    </script>
</body>
</html>
