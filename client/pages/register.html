<!DOCTYPE html>
<html lang="pt-ao" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta | Angola Imóveis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .register-container {
            padding-top: 50px;
        }
        .form-control-custom {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 16px;
            color: white;
            padding: 15px 20px;
            margin-bottom: 15px;
        }
        .form-control-custom:focus {
            background: #252525;
            border-color: var(--neon-lime);
            box-shadow: none;
            color: white;
        }
        .back-btn {
            width: 45px;
            height: 45px;
            background: #1e1e1e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            margin-bottom: 25px;
        }
    </style>
</head>
<body class="bg-dark">

    <div class="container-mobile p-4 register-container">
        
        <a href="login.html" class="back-btn">
            <i class="bi bi-chevron-left"></i>
        </a>

        <div class="mb-4">
            <h1 class="fw-bold">Criar nova conta</h1>
            <p class="text-secondary">Junte-se à maior plataforma de arrendamento de Angola.</p>
        </div>

        <div id="alertPlaceholder"></div>

        <form id="registerForm">
            <div class="mb-1">
                <label class="small text-secondary mb-2 ms-1">Nome Completo</label>
                <input type="text" id="name" class="form-control form-control-custom" placeholder="Como devemos chamar você?" required>
            </div>

            <div class="mb-1">
                <label class="small text-secondary mb-2 ms-1">E-mail</label>
                <input type="email" id="email" class="form-control form-control-custom" placeholder="exemplo@email.com" required>
            </div>

            <div class="mb-1">
                <label class="small text-secondary mb-2 ms-1">Palavra-passe</label>
                <input type="password" id="password" class="form-control form-control-custom" placeholder="Crie uma senha forte" required minlength="6">
            </div>

            <div class="mb-4">
                <label class="small text-secondary mb-2 ms-1">Confirmar Palavra-passe</label>
                <input type="password" id="confirmPassword" class="form-control form-control-custom" placeholder="Repita a senha" required>
            </div>

            <div class="form-check mb-4 ms-1">
                <input class="form-check-input" type="checkbox" id="terms" required>
                <label class="form-check-label small text-secondary" for="terms">
                    Eu aceito os <a href="#" class="text-neon-link text-decoration-none">Termos de Uso</a> e a <a href="#" class="text-neon-link text-decoration-none">Política de Privacidade</a>.
                </label>
            </div>

            <button type="submit" id="btnRegister" class="btn btn-primary-neon w-100 py-3 rounded-4 fw-bold mb-4">
                Criar Conta
            </button>

            <div class="text-center">
                <p class="text-secondary">Já tem uma conta? 
                    <a href="login.html" class="text-neon-link fw-bold text-decoration-none">Faça Login</a>
                </p>
            </div>
        </form>
    </div>

    <script src="../js/api.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const alertPlaceholder = document.getElementById('alertPlaceholder');
            const btn = document.getElementById('btnRegister');

            // Validação de senha
            if (password !== confirmPassword) {
                alertPlaceholder.innerHTML = `
                    <div class="alert alert-danger border-0 bg-danger bg-opacity-10 text-danger rounded-4">
                        As palavras-passe não coincidem.
                    </div>
                `;
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> A criar conta...';

            try {
                const response = await apiService.auth.register({ name, email, password });

                if (response.success) {
                    localStorage.setItem('token', response.user.token);
                    localStorage.setItem('user', JSON.stringify(response.user));
                    
                    alertPlaceholder.innerHTML = `
                        <div class="alert alert-success border-0 bg-success bg-opacity-10 text-success rounded-4">
                            Conta criada com sucesso! Redirecionando...
                        </div>
                    `;
                    
                    setTimeout(() => {
                        window.location.href = '../index.html';
                    }, 1500);
                } else {
                    alertPlaceholder.innerHTML = `
                        <div class="alert alert-danger border-0 bg-danger bg-opacity-10 text-danger rounded-4">
                            ${response.message}
                        </div>
                    `;
                }
            } catch (error) {
                console.error(error);
                alertPlaceholder.innerHTML = '<div class="alert alert-danger border-0 bg-danger bg-opacity-10 text-danger rounded-4">Erro ao conectar com o servidor.</div>';
            } finally {
                btn.disabled = false;
                btn.innerText = 'Criar Conta';
            }
        });
    </script>
</body>
</html>
