<!DOCTYPE html>
<html lang="pt-ao" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Utilizador | Angola Imóveis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .dashboard-container { padding-top: 30px; padding-bottom: 100px; }
        .profile-card {
            background: linear-gradient(135deg, #181818 0%, #0b0b0b 100%);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid #222;
            margin-bottom: 30px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-box {
            background: #181818;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
        }
        .stat-box h2 { color: var(--neon-lime); font-weight: 700; margin-bottom: 5px; }
        .stat-box p { color: #888; font-size: 0.8rem; margin-bottom: 0; }
        
        .manage-card {
            background: #181818;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .manage-card img {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            object-fit: cover;
        }
        .status-badge {
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 10px;
            font-weight: bold;
        }
        .status-active { background: rgba(198, 255, 0, 0.1); color: var(--neon-lime); }
        .status-pending { background: rgba(255, 193, 7, 0.1); color: #ffc107; }

        .btn-action {
            width: 35px;
            height: 35px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            color: white;
            transition: 0.2s;
        }
        .btn-edit { background: #333; }
        .btn-delete { background: rgba(220, 53, 69, 0.1); color: #dc3545; }
        
        .logout-link { color: #dc3545; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body class="bg-dark">

    <div class="container-mobile dashboard-container px-3">
        
        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold mb-0">Meu Perfil</h4>
            <a href="#" onclick="logout()" class="logout-link small">Sair da conta</a>
        </div>

        <!-- User Info -->
        <div class="profile-card d-flex align-items-center gap-3">
            <div class="rounded-circle bg-neon d-flex align-items-center justify-content-center" style="width: 65px; height: 65px; background: var(--neon-lime); color: #000;">
                <i class="bi bi-person-fill fs-2"></i>
            </div>
            <div>
                <h5 class="fw-bold mb-0" id="userName">...</h5>
                <p class="text-secondary small mb-0" id="userEmail">...</p>
            </div>
        </div>

        <!-- Quota & Stats -->
        <div class="stats-grid">
            <div class="stat-box">
                <h2 id="totalProps">0</h2>
                <p>Publicados</p>
            </div>
            <div class="stat-box">
                <h2 id="quotaLeft">0</h2>
                <p>Quota Restante</p>
            </div>
        </div>

        <!-- Properties Management -->
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h6 class="fw-bold mb-0">Gerir Meus Anúncios</h6>
            <a href="publish.html" class="text-neon-link small text-decoration-none">+ Novo</a>
        </div>

        <div id="myPropertiesList">
            <!-- JS carrega aqui -->
            <div class="text-center py-5">
                <div class="spinner-border text-neon" role="status"></div>
            </div>
        </div>

        <!-- History -->
        <h6 class="fw-bold mt-4 mb-3">Histórico de Pagamentos</h6>
        <div id="paymentHistory" class="mb-5">
            <p class="text-secondary small text-center py-3">Nenhum pagamento registrado.</p>
        </div>

        <!-- Bottom Navigation (Fixed) -->
        <nav class="bottom-nav">
            <a href="../index.html" class="nav-item">
                <i class="bi bi-house-door"></i>
                <span>Home</span>
            </a>
            <a href="#" class="nav-item">
                <i class="bi bi-geo-alt"></i>
                <span>Mapa</span>
            </a>
            <div class="nav-item-center">
                <a href="publish.html" class="btn-plus">
                    <i class="bi bi-plus-lg"></i>
                </a>
            </div>
            <a href="#" class="nav-item">
                <i class="bi bi-chat-dots"></i>
                <span>Chat</span>
            </a>
            <a href="dashboard.html" class="nav-item active">
                <i class="bi bi-person-fill"></i>
                <span>Perfil</span>
            </a>
        </nav>
    </div>

    <script src="../js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (!apiService.getToken()) {
                window.location.href = 'login.html';
                return;
            }
            loadDashboardData();
        });

        async function loadDashboardData() {
            try {
                // 1. Carregar Perfil
                const userRes = await apiService.auth.getMe();
                if (userRes.success) {
                    document.getElementById('userName').innerText = userRes.user.name;
                    document.getElementById('userEmail').innerText = userRes.user.email;
                }

                // 2. Carregar Imóveis do Usuário
                const propsRes = await apiService.properties.getMyProperties();
                const container = document.getElementById('myPropertiesList');
                container.innerHTML = '';

                if (propsRes.success) {
                    document.getElementById('totalProps').innerText = propsRes.data.length;
                    
                    if (propsRes.data.length === 0) {
                        container.innerHTML = '<p class="text-secondary text-center small py-4">Você ainda não publicou nada.</p>';
                    } else {
                        propsRes.data.forEach(prop => {
                            container.innerHTML += `
                                <div class="manage-card">
                                    <img src="${prop.main_image}" alt="thumb">
                                    <div class="flex-grow-1 overflow-hidden">
                                        <h6 class="fw-bold mb-1 text-truncate" style="font-size: 0.9rem;">${prop.title}</h6>
                                        <div class="d-flex align-items-center gap-2">
                                            <span class="status-badge status-active">Ativo</span>
                                            <span class="text-secondary small">${formatCurrency(prop.price)}</span>
                                        </div>
                                    </div>
                                    <div class="d-flex gap-2">
                                        <button onclick="deleteProperty(${prop.id})" class="btn-action btn-delete"><i class="bi bi-trash"></i></button>
                                    </div>
                                </div>
                            `;
                        });
                    }
                }

                // 3. Carregar Quota
                const quotaRes = await apiService.payments.getQuota();
                if (quotaRes.success) {
                    const remaining = quotaRes.allowed_posts - propsRes.data.length;
                    document.getElementById('quotaLeft').innerText = remaining > 0 ? remaining : 0;
                }

            } catch (error) {
                console.error(error);
            }
        }

        async function deleteProperty(id) {
            if (confirm('Tem certeza que deseja apagar este anúncio?')) {
                const res = await apiService.properties.delete(id);
                if (res.success) {
                    loadDashboardData();
                } else {
                    alert('Erro ao apagar: ' + res.message);
                }
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        function formatCurrency(value) {
            return new Intl.NumberFormat('pt-AO', {
                style: 'currency',
                currency: 'AOA',
            }).format(value).replace('Kz', 'Kz ');
        }
    </script>
</body>
</html>
