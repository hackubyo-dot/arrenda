<!DOCTYPE html>
<html lang="pt-ao" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Elite Chat VIP | Arrenda Angola</title>

    <!-- 1. FONTES PREMIUM -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- 2. BIBLIOTECAS CORE -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* 
           ===========================================================================
           MASTER DESIGN SYSTEM: ARRENDA ANGOLA VIP - ULTIMATE CHAT
           ===========================================================================
        */
        :root {
            --bg-master: #050505;
            --bg-card: #0f0f0f;
            --bg-sidebar: #080808;
            --bg-input: #121212;
            --bg-glass: rgba(12, 12, 12, 0.85);
            --neon: #c6ff00;
            --neon-rgb: 198, 255, 0;
            --neon-glow: rgba(198, 255, 0, 0.3);
            --text-main: #ffffff;
            --text-secondary: #94a3b8;
            --text-muted: #4b5563;
            --border: rgba(255, 255, 255, 0.08);
            --sidebar-w: 320px;
            --radius-xl: 45px;
            --radius-lg: 32px;
            --radius-md: 20px;
            --trans-smooth: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            --shadow-lux: 0 25px 60px rgba(0, 0, 0, 0.6);
        }

        [data-theme="light"] {
            --bg-master: #f2f5f7;
            --bg-card: #ffffff;
            --bg-sidebar: #ffffff;
            --bg-input: #f8fafb;
            --bg-glass: rgba(255, 255, 255, 0.95);
            --text-main: #0a0a0b;
            --text-secondary: #4b5563;
            --text-muted: #9ca3af;
            --border: rgba(0, 0, 0, 0.12);
            --shadow-lux: 0 25px 60px rgba(0, 0, 0, 0.05);
        }

        /* BASE RESET */
        * { margin: 0; padding: 0; box-sizing: border-box; text-decoration: none !important; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { display: none; }
        
        body {
            background-color: var(--bg-master);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
            height: 100vh;
            transition: background 0.5s ease;
        }

        /* ---------------------------------------------------------------------------
           SIDEBAR DESKTOP (ELITE)
        --------------------------------------------------------------------------- */
        .sidebar-desktop {
            width: var(--sidebar-w);
            height: 100vh;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            position: fixed;
            left: 0; top: 0; padding: 50px 35px;
            display: flex; flex-direction: column; z-index: 2000;
            transition: var(--trans-smooth);
        }

        .sidebar-brand { display: flex; align-items: center; gap: 18px; margin-bottom: 60px; }
        .logo-box {
            width: 52px; height: 52px; background: var(--neon); color: #000;
            border-radius: 16px; display: grid; place-items: center;
            font-weight: 900; font-size: 1.8rem; box-shadow: 0 0 25px var(--neon-glow);
        }
        .logo-text { font-size: 1.6rem; font-weight: 800; letter-spacing: -1.5px; color: var(--text-main); }
        .logo-text span { color: var(--neon); }

        .nav-link {
            display: flex; align-items: center; gap: 18px; padding: 18px 25px;
            color: var(--text-secondary); border-radius: 22px; font-weight: 700;
            transition: var(--trans-smooth); margin-bottom: 10px;
        }
        .nav-link:hover { background: var(--bg-card); color: var(--text-main); transform: translateX(8px); }
        .nav-link.active { background: var(--neon); color: #000; box-shadow: 0 10px 25px rgba(var(--neon-rgb), 0.25); }

        .sidebar-footer { padding-top: 30px; border-top: 1px solid var(--border); }
        
        /* THEME SELECTOR ELITE */
        .theme-hub {
            background: var(--bg-input); border: 1px solid var(--border);
            padding: 8px; border-radius: 22px; display: flex; gap: 5px; margin-bottom: 25px;
        }
        .theme-hub-btn {
            flex: 1; border: none; padding: 12px; border-radius: 16px;
            background: transparent; color: var(--text-muted); font-weight: 800;
            font-size: 0.75rem; display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: 0.4s;
        }
        .theme-hub-btn.active { background: var(--bg-card); color: var(--text-main); box-shadow: var(--shadow-lux); }

        /* ---------------------------------------------------------------------------
           COLUNAS DO CHAT (MASTER WRAPPER)
        --------------------------------------------------------------------------- */
        .main-wrapper { margin-left: var(--sidebar-w); height: 100vh; display: flex; transition: var(--trans-smooth); }

        /* INBOX */
        .inbox-column {
            width: 450px; border-right: 1px solid var(--border);
            display: flex; flex-direction: column; background: var(--bg-sidebar);
        }
        .inbox-header { padding: 45px 35px 25px 35px; }
        .inbox-header h2 { font-weight: 900; font-size: 2.2rem; letter-spacing: -2px; margin-bottom: 20px; }

        /* COMMUNITY TRAY (ESTILO STORIES) */
        .community-tray {
            display: flex; gap: 18px; overflow-x: auto;
            padding: 5px 35px 30px 35px; border-bottom: 1px solid var(--border);
            -webkit-overflow-scrolling: touch;
        }
        .community-tray::-webkit-scrollbar { display: none; }

        .member-story {
            display: flex; flex-direction: column; align-items: center;
            min-width: 80px; cursor: pointer; transition: 0.3s;
        }
        .aura-avatar {
            width: 72px; height: 72px; border-radius: 50%;
            background: var(--bg-master); border: 2.5px solid var(--border);
            display: grid; place-items: center; position: relative;
            font-weight: 900; color: var(--neon); font-size: 1.5rem;
            transition: 0.3s;
        }
        .member-story.online .aura-avatar { border-color: var(--neon); box-shadow: 0 0 20px rgba(var(--neon-rgb), 0.3); }
        .online-dot { 
            position: absolute; bottom: 4px; right: 4px; width: 14px; height: 14px;
            background: #00ff00; border-radius: 50%; border: 3px solid var(--bg-sidebar);
        }
        .member-story span { font-size: 0.65rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-top: 10px; width: 100%; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .conversation-scroll { flex: 1; overflow-y: auto; padding: 25px; }
        .chat-card-elite {
            padding: 22px; border-radius: 30px; display: flex; align-items: center;
            gap: 18px; cursor: pointer; transition: 0.4s; margin-bottom: 12px;
            border: 1px solid transparent;
        }
        .chat-card-elite:hover { background: var(--bg-input); }
        .chat-card-elite.active { background: var(--bg-card); border-color: var(--border); box-shadow: var(--shadow-lux); }
        
        .chat-card-data h6 { font-weight: 800; font-size: 1.1rem; margin: 0; color: var(--text-main); }
        .chat-card-data p { font-size: 0.85rem; color: var(--text-muted); margin: 3px 0 0 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* WINDOW */
        .chat-window { flex: 1; display: flex; flex-direction: column; background: var(--bg-master); }

        .chat-header-lux {
            padding: 25px 40px; background: var(--bg-card); border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .messages-container {
            flex: 1; overflow-y: auto; padding: 50px; display: flex; flex-direction: column; gap: 20px;
            background-image: radial-gradient(var(--border) 1px, transparent 1px); background-size: 45px 45px;
        }

        .bubble {
            max-width: 60%; padding: 20px 26px; border-radius: 32px; font-weight: 600; line-height: 1.6;
            position: relative; animation: msgSlideUp 0.4s ease-out;
        }
        @keyframes msgSlideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .bubble.sent { align-self: flex-end; background: var(--neon); color: #000; font-weight: 800; border-bottom-right-radius: 6px; box-shadow: 0 10px 25px rgba(var(--neon-rgb), 0.2); }
        .bubble.received { align-self: flex-start; background: var(--bg-card); color: var(--text-main); border: 1px solid var(--border); border-bottom-left-radius: 6px; }

        .bubble .meta { font-size: 0.6rem; margin-top: 10px; display: block; opacity: 0.6; text-transform: uppercase; font-weight: 800; }

        .chat-footer-lux { padding: 35px 50px 50px 50px; background: var(--bg-master); }
        .input-box-vip {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 30px;
            padding: 12px 20px; display: flex; align-items: center; gap: 20px;
            box-shadow: var(--shadow-lux);
        }
        .input-box-vip input { flex: 1; background: transparent; border: none; color: var(--text-main); font-weight: 600; outline: none; font-size: 1.05rem; }
        
        .btn-send-elite {
            width: 58px; height: 58px; background: var(--neon); color: #000; border: none;
            border-radius: 20px; display: grid; place-items: center; font-size: 1.4rem;
            transition: 0.3s; box-shadow: 0 8px 20px rgba(var(--neon-rgb), 0.3);
        }

        /* ---------------------------------------------------------------------------
           MOBILE NAVIGATION (FIEL À INDEX)
        --------------------------------------------------------------------------- */
        .mobile-nav-elite {
            position: fixed; bottom: 0; left: 0; right: 0; height: 100px;
            background: var(--bg-glass); backdrop-filter: blur(40px);
            border-top: 1px solid var(--border); display: flex;
            justify-content: space-around; align-items: center; padding-bottom: 25px; z-index: 3000;
            border-top-left-radius: 35px; border-top-right-radius: 35px;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.1);
        }
        .m-nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); text-decoration: none; }
        .m-nav-item.active { color: var(--text-main); }
        .m-nav-item i { font-size: 1.8rem; }
        .m-nav-item span { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; margin-top: 2px; }

        .m-center-box {
            width: 75px; height: 75px; background: var(--neon); color: #000;
            border-radius: 50%; display: grid; place-items: center;
            font-size: 2rem; transform: translateY(-35px);
            box-shadow: 0 15px 35px rgba(var(--neon-rgb), 0.4);
            border: 8px solid var(--bg-master);
        }

        /* ---------------------------------------------------------------------------
           RESPONSIVIDADE
        --------------------------------------------------------------------------- */
        @media (max-width: 991px) {
            .sidebar-desktop { display: none; }
            .main-wrapper { margin-left: 0; }
            .inbox-column { width: 100%; }
            .chat-window { position: fixed; inset: 0; z-index: 5000; display: none; }
            .chat-window.active { display: flex; animation: slideInMobile 0.4s forwards; }
            @keyframes slideInMobile { from { transform: translateX(100%); } to { transform: translateX(0); } }
            .mobile-nav-elite { display: flex !important; }
        }
    </style>
</head>
<body>

    <div class="app-shell">
        
        <!-- SIDEBAR DESKTOP -->
        <aside class="sidebar-desktop d-none d-lg-flex">
            <a href="../index.html" class="sidebar-brand">
                <div class="logo-box">V</div>
                <div class="logo-text">Arrenda<span>VIP</span></div>
            </a>
            <nav class="sidebar-menu">
                <a href="../index.html" class="nav-link"><i class="bi bi-house-door-fill"></i> <span>Explorar</span></a>
                <a href="chat.html" class="nav-link active"><i class="bi bi-chat-dots-fill"></i> <span>Mensagens</span></a>
                <a href="dashboard.html" class="nav-link"><i class="bi bi-grid-1x2-fill"></i> <span>Meu Painel</span></a>
                <a href="settings.html" class="nav-link"><i class="bi bi-person-fill"></i> <span>Definições</span></a>
            </nav>
            <div class="sidebar-footer">
                <div class="theme-hub">
                    <button class="theme-hub-btn" id="btnThemeDark"><i class="bi bi-moon-stars-fill"></i> Escuro</button>
                    <button class="theme-hub-btn" id="btnThemeLight"><i class="bi bi-brightness-high-fill"></i> Claro</button>
                </div>
                <div class="p-3 bg-card rounded-4 border border-secondary border-opacity-10 d-flex align-items-center gap-3">
                    <div style="width:12px; height:12px; background:var(--neon); border-radius:50%"></div>
                    <span class="fw-800 small" id="userNameSide">Utilizador VIP</span>
                </div>
            </div>
        </aside>

        <!-- MASTER WRAPPER -->
        <main class="main-wrapper">
            
            <!-- INBOX COLUMN -->
            <div class="inbox-column">
                <header class="inbox-header">
                    <h2>Mensagens</h2>
                    <div class="input-box-vip" style="background:var(--bg-input); padding: 10px 18px; border-radius: 20px;">
                        <i class="bi bi-search text-muted"></i>
                        <input type="text" placeholder="Procurar VIP...">
                    </div>
                </header>

                <!-- COMMUNITY TRAY (FORCED MEMBERS) -->
                <div class="community-tray" id="forcedCommunityTray">
                    <!-- Injetado via Javascript forçadamente -->
                </div>

                <div class="conversation-scroll" id="activeInboxList">
                    <!-- Conversas recentes aqui -->
                </div>
            </div>

            <!-- CHAT WINDOW -->
            <div class="chat-window" id="chatPane">
                
                <div id="initialPlaceholder" class="h-100 d-flex flex-column align-items-center justify-content-center text-center p-5">
                    <div class="logo-box mb-4" style="width:100px; height:100px; font-size:3rem; opacity:0.3;">V</div>
                    <h3 class="fw-900">Elite Business Chat</h3>
                    <p class="text-muted" style="max-width: 380px;">Selecione um membro da comunidade ou uma conversa ativa para negociar o seu próximo imóvel de luxo.</p>
                </div>

                <div id="activeChatUI" class="d-none h-100 flex-column">
                    <header class="chat-header-lux">
                        <div class="d-flex align-items-center gap-3">
                            <button onclick="closeChatMobile()" class="btn d-lg-none text-main me-2"><i class="bi bi-chevron-left fs-2"></i></button>
                            <div class="aura-avatar" id="headerPeerAvatar" style="width:55px; height:55px; font-size: 1.1rem;">?</div>
                            <div>
                                <h5 id="peerName">Utilizador</h5>
                                <span class="small text-neon fw-bold">ONLINE ● VIP</span>
                            </div>
                        </div>
                    </header>

                    <div class="messages-container" id="messagesBody">
                        <!-- Bolhas de Mensagem -->
                    </div>

                    <footer class="chat-footer-lux">
                        <form id="sendMessageForm" class="input-box-vip">
                            <button type="button" class="btn border-0 text-muted fs-4"><i class="bi bi-plus-circle"></i></button>
                            <input type="text" id="mainChatInput" placeholder="Sua mensagem de elite..." autocomplete="off">
                            <button type="submit" class="btn-send-elite"><i class="bi bi-send-fill"></i></button>
                        </form>
                    </footer>
                </div>
            </div>

        </main>

        <!-- DOWNBAR MOBILE (FIEL À INDEX) -->
        <nav class="mobile-nav-elite d-lg-none">
            <a href="../index.html" class="m-nav-item"><i class="bi bi-house-door-fill"></i><span>Início</span></a>
            <a href="chat.html" class="m-nav-item active"><i class="bi bi-chat-dots-fill"></i><span>Chat</span></a>
            <div class="m-center-box" onclick="location.href='publish.html'"><i class="bi bi-plus-lg"></i></div>
            <a href="dashboard.html" class="m-nav-item"><i class="bi bi-grid-fill"></i><span>Painel</span></a>
            <a href="settings.html" class="m-nav-item"><i class="bi bi-person-fill"></i><span>Perfil</span></a>
        </nav>

    </div>

    <!-- SCRIPTS ENGINE -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="../js/api.js"></script>

    <script>
        /**
         * ENGINE SUPREMA DE CHAT - ARRENDA ANGOLA VIP
         */
        let socket;
        let activePeer = null;
        const currentUser = JSON.parse(localStorage.getItem('user'));

        document.addEventListener('DOMContentLoaded', () => {
            if(!currentUser) { window.location.href = 'login.html'; return; }
            
            ThemeEngine.init();
            initSocket();
            forceLoadCommunity(); // FORÇA A EXIBIÇÃO DE UTILIZADORES
            loadConversations();
            
            document.getElementById('userNameSide').innerText = currentUser.name;
        });

        function initSocket() {
            socket = io();
            socket.emit('setup', currentUser);
            socket.on('message received', (msg) => {
                if(activePeer && msg.sender_id == activePeer.id) {
                    renderMessage(msg, 'received');
                    scrollToBottom();
                } else {
                    loadConversations();
                }
            });
        }

        /**
         * MOTOR DE FORÇAMENTO DE COMUNIDADE (UTILIZADORES RECENTES)
         */
        async function forceLoadCommunity() {
            const tray = document.getElementById('forcedCommunityTray');
            
            // 1. Tentar buscar dados Reais
            try {
                const res = await apiService.users.getAll();
                if(res.success && res.data.length > 0) {
                    renderTray(res.data);
                    return;
                }
            } catch(e) { console.warn("API de Utilizadores offline. Usando Fallback VIP."); }

            // 2. Fallback (Forçar usuários caso a API falhe ou retorne vazio)
            const fallbackUsers = [
                { id: '101', name: 'Augusto VIP' },
                { id: '102', name: 'Marta Real State' },
                { id: '103', name: 'Condomínio Girassol' },
                { id: '104', name: 'Investidor Elite' },
                { id: '105', name: 'Arrenda Luanda' },
                { id: '106', name: 'VIP Angola' }
            ];
            renderTray(fallbackUsers);

            function renderTray(users) {
                tray.innerHTML = users.filter(u => u.id != currentUser.id).map(u => `
                    <div class="member-story online" onclick="startChat('${u.id}', '${u.name}')">
                        <div class="aura-avatar">${u.name.charAt(0)}<div class="online-status-dot"></div></div>
                        <span>${u.name.split(' ')[0]}</span>
                    </div>
                `).join('');
            }
        }

        async function loadConversations() {
            const list = document.getElementById('activeInboxList');
            try {
                const res = await apiService.chat.getConversations();
                if(res.success) {
                    list.innerHTML = res.data.map(c => `
                        <div class="chat-card-elite ${activePeer?.id == c.other_id ? 'active' : ''}" onclick="startChat('${c.other_id}', '${c.other_name}')">
                            <div class="aura-avatar" style="width:60px; height:60px;">${c.other_name.charAt(0)}</div>
                            <div class="chat-card-data flex-grow-1">
                                <h6>${c.other_name}</h6>
                                <p>${c.message_text || 'Anexo VIP enviado...'}</p>
                            </div>
                            ${c.unread_count > 0 ? '<span class="badge bg-neon text-dark rounded-pill">'+c.unread_count+'</span>' : ''}
                        </div>
                    `).join('');
                }
            } catch(e) { console.error(e); }
        }

        async function startChat(id, name) {
            activePeer = { id, name };
            document.getElementById('initialPlaceholder').classList.add('d-none');
            document.getElementById('activeChatUI').classList.remove('d-none');
            document.getElementById('chatPane').classList.add('active');
            
            document.getElementById('peerName').innerText = name;
            document.getElementById('headerPeerAvatar').innerText = name.charAt(0);

            const body = document.getElementById('messagesBody');
            body.innerHTML = '<div class="text-center py-5"><div class="spinner-border text-neon"></div></div>';

            try {
                const res = await apiService.chat.getMessages(id);
                if(res.success) {
                    body.innerHTML = '';
                    res.data.forEach(m => {
                        const type = m.sender_id == currentUser.id ? 'sent' : 'received';
                        renderMessage(m, type);
                    });
                    scrollToBottom();
                }
            } catch(e) { console.error(e); }
        }

        function renderMessage(m, type) {
            const body = document.getElementById('messagesBody');
            const div = document.createElement('div');
            div.className = `bubble ${type}`;
            div.innerHTML = `
                ${m.message_text}
                <span class="meta">${new Date(m.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
            `;
            body.appendChild(div);
        }

        document.getElementById('sendMessageForm').onsubmit = async (e) => {
            e.preventDefault();
            const input = document.getElementById('mainChatInput');
            const text = input.value.trim();
            if(!text || !activePeer) return;

            input.value = '';

            try {
                const res = await apiService.chat.send({ receiver_id: activePeer.id, message_text: text });
                if(res.success) {
                    renderMessage(res.data, 'sent');
                    scrollToBottom();
                    socket.emit('new message', { ...res.data, receiverId: activePeer.id });
                }
            } catch(e) { console.error(e); }
        };

        /**
         * THEME ENGINE
         */
        const ThemeEngine = {
            init: () => {
                const saved = localStorage.getItem('theme') || 'dark';
                ThemeEngine.apply(saved);
                document.getElementById('btnThemeDark').onclick = () => ThemeEngine.apply('dark');
                document.getElementById('btnThemeLight').onclick = () => ThemeEngine.apply('light');
            },
            apply: (t) => {
                document.documentElement.setAttribute('data-theme', t);
                localStorage.setItem('theme', t);
                document.querySelectorAll('.theme-hub-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(t === 'dark' ? 'btnThemeDark' : 'btnThemeLight').classList.add('active');
            }
        };

        function closeChatMobile() { document.getElementById('chatPane').classList.remove('active'); }
        function scrollToBottom() { const b = document.getElementById('messagesBody'); b.scrollTop = b.scrollHeight; }
    </script>
</body>
</html>
