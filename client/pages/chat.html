<!DOCTYPE html>
<html lang="pt-ao" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensagens | Angola Imóveis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .chat-container { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .inbox-list { flex: 1; overflow-y: auto; padding: 20px; }
        .chat-window { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 1100; display: none; flex-direction: column; }
        
        /* Inbox Cards */
        .conversa-item {
            background: #181818; border-radius: 18px; padding: 15px; margin-bottom: 12px;
            display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.2s;
        }
        .conversa-item:active { transform: scale(0.98); background: #222; }
        .user-avatar { width: 50px; height: 50px; background: var(--neon-lime); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; }
        .unread-dot { width: 10px; height: 10px; background: var(--neon-lime); border-radius: 50%; }

        /* Message Bubbles */
        .messages-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 0.95rem; line-height: 1.4; position: relative; }
        .msg-sent { align-self: flex-end; background: var(--neon-lime); color: #000; border-bottom-right-radius: 4px; }
        .msg-received { align-self: flex-start; background: #222; color: #fff; border-bottom-left-radius: 4px; }
        .msg img { max-width: 100%; border-radius: 10px; margin-top: 5px; }
        .msg-time { font-size: 0.7rem; opacity: 0.6; margin-top: 5px; display: block; text-align: right; }

        /* Input Area */
        .chat-input-bar { padding: 15px; background: #121212; border-top: 1px solid #222; display: flex; gap: 10px; align-items: center; }
        .btn-attach { background: #222; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .input-text { flex: 1; background: #1e1e1e; border: 1px solid #333; color: white; border-radius: 25px; padding: 10px 20px; outline: none; }
        .btn-send { background: var(--neon-lime); color: #000; border: none; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="bg-dark">

    <div class="container-mobile chat-container">
        
        <!-- Header Inbox -->
        <header class="p-3 d-flex justify-content-between align-items-center border-bottom border-secondary border-opacity-10">
            <h4 class="fw-bold mb-0">Mensagens</h4>
            <div class="bg-card p-2 rounded-circle"><i class="bi bi-search"></i></div>
        </header>

        <!-- Lista de Conversas (Inbox) -->
        <div id="inboxList" class="inbox-list">
            <!-- Carregado via JS do Neon DB -->
            <div class="text-center py-5">
                <div class="spinner-border text-neon" role="status"></div>
            </div>
        </div>

        <!-- Janela de Chat Ativo (Hidden by default) -->
        <div id="chatWindow" class="chat-window">
            <header class="p-3 d-flex align-items-center gap-3 border-bottom border-secondary border-opacity-10">
                <button onclick="closeChat()" class="btn btn-link text-white p-0"><i class="bi bi-chevron-left fs-4"></i></button>
                <div class="user-avatar" style="width: 40px; height: 40px;" id="activeChatAvatar">?</div>
                <div class="flex-grow-1">
                    <h6 class="fw-bold mb-0" id="activeChatName">Nome do Usuário</h6>
                    <span class="small text-neon" style="font-size: 0.7rem;">● Online agora</span>
                </div>
            </header>

            <div id="messagesArea" class="messages-area">
                <!-- Mensagens em tempo real aqui -->
            </div>

            <form id="chatForm" class="chat-input-bar">
                <input type="file" id="chatFileInput" hidden accept="image/*,.pdf,.doc,.docx">
                <button type="button" class="btn-attach" onclick="document.getElementById('chatFileInput').click()">
                    <i class="bi bi-paperclip fs-5"></i>
                </button>
                <input type="text" id="chatInput" class="input-text" placeholder="Escreve a tua mensagem...">
                <button type="submit" class="btn-send">
                    <i class="bi bi-send-fill fs-5"></i>
                </button>
            </form>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="../index.html" class="nav-item">
                <i class="bi bi-house-door"></i>
                <span>Home</span>
            </a>
            <a href="#" class="nav-item">
                <i class="bi bi-geo-alt"></i>
                <span>Mapa</span>
            </a>
            <div class="nav-item-center">
                <a href="publish.html" class="btn-plus">
                    <i class="bi bi-plus-lg"></i>
                </a>
            </div>
            <a href="chat.html" class="nav-item active">
                <i class="bi bi-chat-dots-fill"></i>
                <span>Chat</span>
            </a>
            <a href="dashboard.html" class="nav-item">
                <i class="bi bi-person"></i>
                <span>Perfil</span>
            </a>
        </nav>

    </div>

    <!-- Scripts -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/chat.js"></script>
</body>
</html>
