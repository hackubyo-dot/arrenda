<!DOCTYPE html>
<html lang="pt-ao" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mensagens VIP | Arrenda Angola</title>
    
    <!-- FONTES PREMIUM -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- ICONS & BOOTSTRAP -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- ESTILO CUSTOMIZADO SUPREMO -->
    <link rel="stylesheet" href="../css/style.css">

    <style>
        /* 
           ESPECIFICAÇÕES VISUAIS DO CHAT ELITE 
        */
        .chat-master-wrapper {
            display: flex;
            height: calc(100vh - 120px);
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            overflow: hidden;
            margin-top: 20px;
            box-shadow: var(--shadow);
        }

        /* COLUNA ESQUERDA: LISTA DE CONVERSAS */
        .inbox-sidebar {
            width: 400px;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            background: var(--bg-sidebar);
            transition: var(--transition);
        }

        .inbox-header-elite {
            padding: 35px 30px;
            border-bottom: 1px solid var(--border);
        }

        .search-chat-box {
            background: var(--bg-app);
            border-radius: 15px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
            border: 1px solid var(--border);
        }

        .search-chat-box input {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 0.9rem;
            width: 100%;
        }

        .inbox-list-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .conversation-card {
            padding: 18px;
            border-radius: 22px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 8px;
            border: 1px solid transparent;
        }

        .conversation-card:hover {
            background: var(--bg-app);
        }

        .conversation-card.active {
            background: var(--neon-soft);
            border-color: var(--neon);
        }

        .chat-avatar-3d {
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, var(--neon), #8efc00);
            color: #000;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.3rem;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            flex-shrink: 0;
        }

        .unread-badge {
            width: 10px;
            height: 10px;
            background: var(--neon);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--neon);
        }

        /* COLUNA DIREITA: JANELA DE MENSAGENS */
        .chat-view-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-app);
            position: relative;
        }

        .chat-view-header {
            padding: 20px 35px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }

        .messages-display-area {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background-image: radial-gradient(var(--border) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* BOLHAS DE MENSAGEM */
        .msg-bubble {
            max-width: 65%;
            padding: 16px 22px;
            border-radius: 25px;
            font-size: 0.95rem;
            line-height: 1.6;
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            animation: msgIn 0.4s ease;
        }

        @keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .msg-sent {
            align-self: flex-end;
            background: var(--neon);
            color: #000;
            font-weight: 600;
            border-bottom-right-radius: 5px;
        }

        .msg-received {
            align-self: flex-start;
            background: var(--bg-card);
            color: var(--text-main);
            border-bottom-left-radius: 5px;
            border: 1px solid var(--border);
        }

        .msg-time {
            font-size: 0.65rem;
            display: block;
            margin-top: 8px;
            opacity: 0.6;
        }

        .msg-sent .msg-time { color: #000; text-align: right; }

        /* FOOTER / INPUT AREA */
        .chat-view-footer {
            padding: 25px 35px;
            background: var(--bg-card);
            border-top: 1px solid var(--border);
        }

        .input-bar-elite {
            background: var(--bg-app);
            border-radius: 20px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid var(--border);
        }

        .chat-input-field {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            padding: 10px;
            font-weight: 500;
        }

        .btn-chat-send {
            width: 50px;
            height: 50px;
            background: var(--neon);
            color: #000;
            border-radius: 15px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            transition: 0.3s;
        }

        .btn-chat-send:hover {
            transform: scale(1.1) rotate(-10deg);
            box-shadow: var(--shadow-neon);
        }

        .btn-chat-attach {
            background: transparent;
            color: var(--text-muted);
            border: none;
            font-size: 1.4rem;
            transition: 0.3s;
        }

        .btn-chat-attach:hover { color: var(--neon); }

        /* ESTADO VAZIO */
        .empty-chat-placeholder {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            text-align: center;
            padding: 40px;
        }

        .empty-chat-placeholder i {
            font-size: 5rem;
            margin-bottom: 20px;
            background: linear-gradient(var(--neon), #444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0.5;
        }

        /* MOBILE OVERRIDES */
        @media (max-width: 991px) {
            .chat-master-wrapper { height: calc(100vh - 160px); border-radius: 0; border: none; margin: 0; }
            .inbox-sidebar { width: 100%; position: absolute; left: 0; top: 0; height: 100%; z-index: 20; }
            .chat-view-pane { width: 100%; position: absolute; left: 100%; top: 0; height: 100%; z-index: 30; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
            .chat-view-pane.active { left: 0; }
            .sidebar-desktop { display: none; }
            .main-content { margin-left: 0; padding: 0; }
        }
    </style>
</head>
<body>

    <div class="app-shell">
        
        <!-- =============================================
             SIDEBAR DESKTOP ELITE
             ============================================= -->
        <aside class="sidebar-desktop d-none d-lg-flex">
            <div class="sidebar-logo">
                <div class="logo-icon"><i class="bi bi-houses-fill"></i></div>
                <div class="logo-text">Arrenda<span>VIP</span></div>
            </div>

            <nav class="sidebar-nav">
                <a href="../index.html" class="nav-link"><i class="bi bi-house-door"></i> <span>Início</span></a>
                <a href="chat.html" class="nav-link active"><i class="bi bi-chat-dots-fill"></i> <span>Mensagens</span></a>
                <a href="dashboard.html" class="nav-link"><i class="bi bi-grid-fill"></i> <span>Meu Painel</span></a>
                <a href="settings.html" class="nav-link"><i class="bi bi-gear"></i> <span>Definições</span></a>
            </nav>

            <div class="sidebar-footer">
                <div id="userProfileStatus" class="p-3 bg-app rounded-4 border border-secondary border-opacity-10 mb-3">
                    <!-- Preenchido via JS -->
                </div>
                <button id="theme-toggle" class="btn-theme-premium w-100">
                    <i class="bi bi-moon-stars-fill"></i> <span>Modo Escuro</span>
                </button>
            </div>
        </aside>

        <!-- =============================================
             CONTEÚDO PRINCIPAL (CHAT)
             ============================================= -->
        <main class="main-content">
            
            <header class="top-header-elite glass-effect px-4">
                <div class="header-container-inner">
                    <h2 class="fw-800 mb-0">Central de Negócios</h2>
                    <div class="d-flex gap-3">
                        <button class="icon-btn-premium"><i class="bi bi-archive"></i></button>
                        <button class="icon-btn-premium"><i class="bi bi-three-dots-vertical"></i></button>
                    </div>
                </div>
            </header>

            <div class="chat-master-wrapper animate-fade">
                
                <!-- COLUNA ESQUERDA: INBOX -->
                <div class="inbox-sidebar" id="inboxSidebar">
                    <div class="inbox-header-elite">
                        <h4 class="fw-800 mb-0">Conversas</h4>
                        <div class="search-chat-box">
                            <i class="bi bi-search text-muted"></i>
                            <input type="text" placeholder="Procurar contacto...">
                        </div>
                    </div>

                    <div class="inbox-list-container" id="inboxList">
                        <!-- SKELETONS -->
                        <div class="text-center py-5"><div class="spinner-border text-neon"></div></div>
                    </div>
                </div>

                <!-- COLUNA DIREITA: JANELA DE CHAT -->
                <div class="chat-view-pane" id="chatPane">
                    
                    <!-- Estado Inicial (Sem conversa selecionada) -->
                    <div id="noChatSelected" class="empty-chat-placeholder">
                        <i class="bi bi-chat-square-heart"></i>
                        <h3 class="fw-800 text-white">Tuas Mensagens VIP</h3>
                        <p class="text-muted">Seleciona uma conversa para negociar o teu próximo imóvel de luxo em Angola.</p>
                    </div>

                    <!-- Janela Ativa (Oculta por padrão) -->
                    <div id="activeChatUI" class="d-none h-100 flex-column">
                        <header class="chat-view-header">
                            <div class="d-flex align-items-center gap-3">
                                <button onclick="closeChatMobile()" class="btn d-lg-none text-white p-0 me-2"><i class="bi bi-chevron-left fs-3"></i></button>
                                <div class="chat-avatar-3d" id="activeUserAvatar">?</div>
                                <div>
                                    <h5 class="fw-800 mb-0 text-white" id="activeUserName">Nome do Utilizador</h5>
                                    <span class="small text-neon fw-bold" style="font-size: 0.7rem;">● ONLINE AGORA</span>
                                </div>
                            </div>
                            <div class="d-flex gap-2">
                                <button class="btn btn-dark rounded-circle" title="Ligar"><i class="bi bi-telephone-fill"></i></button>
                                <button class="btn btn-dark rounded-circle" title="Video"><i class="bi bi-camera-video-fill"></i></button>
                            </div>
                        </header>

                        <div class="messages-display-area" id="messagesArea">
                            <!-- Mensagens dinâmicas aqui -->
                        </div>

                        <footer class="chat-view-footer">
                            <form id="chatMessageForm" class="input-bar-elite">
                                <button type="button" class="btn-chat-attach" onclick="document.getElementById('chatFile').click()">
                                    <i class="bi bi-plus-circle-fill"></i>
                                </button>
                                <input type="file" id="chatFile" hidden accept="image/*,.pdf">
                                
                                <input type="text" id="chatInput" class="chat-input-field" placeholder="Escreve a tua mensagem premium..." autocomplete="off">
                                
                                <button type="submit" class="btn-chat-send">
                                    <i class="bi bi-send-fill"></i>
                                </button>
                            </form>
                        </footer>
                    </div>

                </div>

            </div>

        </main>

        <!-- =============================================
             MOBILE NAVIGATION (BOTTOM BAR)
             ============================================= -->
        <nav class="mobile-nav-elite d-lg-none">
            <a href="../index.html" class="m-nav-item"><i class="bi bi-house-door"></i><span>Home</span></a>
            <a href="chat.html" class="m-nav-item active"><i class="bi bi-chat-dots-fill"></i><span>Chat</span></a>
            <div class="m-nav-publish-box"><a href="publish.html" class="m-btn-publish"><i class="bi bi-plus-lg"></i></a></div>
            <a href="dashboard.html" class="m-nav-item"><i class="bi bi-person-fill"></i><span>Painel</span></a>
            <a href="settings.html" class="m-nav-item"><i class="bi bi-gear"></i><span>Definições</span></a>
        </nav>

    </div>

    <!-- SCRIPTS CORE -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="../js/api.js"></script>
    <script>
        /**
         * LÓGICA DE CHAT ELITE - FULL REALTIME
         */
        let socket;
        let currentReceiverId = null;
        let currentUser = JSON.parse(localStorage.getItem('user'));

        document.addEventListener('DOMContentLoaded', () => {
            if(!currentUser) { window.location.href = 'login.html'; return; }
            initChatEngine();
            loadConversations();
            setupTheme();
        });

        function initChatEngine() {
            socket = io(); // Conecta ao servidor Render
            socket.emit('setup', currentUser);

            socket.on('message received', (msg) => {
                if(currentReceiverId == msg.sender_id) {
                    renderSingleMessage(msg, 'received');
                    scrollToBottom();
                } else {
                    loadConversations(); // Notifica na lista lateral
                }
            });
        }

        async function loadConversations() {
            const list = document.getElementById('inboxList');
            try {
                const res = await apiService.chat.getConversations();
                if(res.success) {
                    list.innerHTML = res.data.map(c => `
                        <div class="conversation-card ${currentReceiverId == c.other_id ? 'active' : ''}" onclick="openChat('${c.other_id}', '${c.other_name}')">
                            <div class="chat-avatar-3d">${c.other_name.charAt(0)}</div>
                            <div class="flex-grow-1 overflow-hidden">
                                <div class="d-flex justify-content-between align-items-center mb-1">
                                    <h6 class="fw-800 mb-0 text-white text-truncate">${c.other_name}</h6>
                                    <span class="small text-muted" style="font-size: 0.6rem;">${new Date(c.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                                </div>
                                <p class="small text-muted text-truncate mb-0">${c.message_text || 'Ficheiro enviado'}</p>
                            </div>
                            ${c.unread_count > 0 ? '<div class="unread-badge"></div>' : ''}
                        </div>
                    `).join('');
                }
            } catch(e) { console.error(e); }
        }

        async function openChat(id, name) {
            currentReceiverId = id;
            document.getElementById('noChatSelected').classList.add('d-none');
            document.getElementById('activeChatUI').classList.remove('d-none');
            document.getElementById('chatPane').classList.add('active'); // Mobile slide
            
            document.getElementById('activeUserName').innerText = name;
            document.getElementById('activeUserAvatar').innerText = name.charAt(0);

            const area = document.getElementById('messagesArea');
            area.innerHTML = '<div class="text-center py-5"><div class="spinner-border text-neon"></div></div>';

            try {
                const res = await apiService.chat.getMessages(id);
                if(res.success) {
                    area.innerHTML = '';
                    res.data.forEach(m => {
                        const type = m.sender_id == currentUser.id ? 'sent' : 'received';
                        renderSingleMessage(m, type);
                    });
                    scrollToBottom();
                }
            } catch(e) { console.error(e); }
        }

        function renderSingleMessage(m, type) {
            const area = document.getElementById('messagesArea');
            const div = document.createElement('div');
            div.className = `msg-bubble msg-${type}`;
            
            let content = m.message_text ? `<span class="d-block">${m.message_text}</span>` : '';
            if(m.file_url) {
                content += m.file_type === 'image' 
                    ? `<img src="${m.file_url}" class="img-fluid rounded-3 mt-2" onclick="window.open('${m.file_url}')">`
                    : `<a href="${m.file_url}" target="_blank" class="d-block mt-2 text-dark small"><i class="bi bi-file-earmark-arrow-down"></i> Baixar Ficheiro</a>`;
            }

            div.innerHTML = `${content} <span class="msg-time">${new Date(m.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>`;
            area.appendChild(div);
        }

        document.getElementById('chatMessageForm').onsubmit = async (e) => {
            e.preventDefault();
            const input = document.getElementById('chatInput');
            const file = document.getElementById('chatFile').files[0];
            if(!input.value.trim() && !file) return;

            const formData = new FormData();
            formData.append('receiver_id', currentReceiverId);
            formData.append('message_text', input.value);
            if(file) formData.append('chat_file', file);

            const textBackup = input.value;
            input.value = ''; // Limpa imediato

            try {
                const res = await apiService.chat.send(formData);
                if(res.success) {
                    renderSingleMessage(res.data, 'sent');
                    scrollToBottom();
                    socket.emit('new message', { ...res.data, receiverId: currentReceiverId });
                }
            } catch(e) { console.error(e); input.value = textBackup; }
        };

        function closeChatMobile() {
            document.getElementById('chatPane').classList.remove('active');
        }

        function scrollToBottom() {
            const area = document.getElementById('messagesArea');
            area.scrollTop = area.scrollHeight;
        }

        function setupTheme() {
            const t = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', t);
            const userBox = document.getElementById('userProfileStatus');
            if(currentUser) userBox.innerHTML = `<div class="d-flex align-items-center gap-2"><div class="avatar-elite-sm">${currentUser.name.charAt(0)}</div><span class="fw-bold small">${currentUser.name}</span></div>`;
        }
    </script>
</body>
</html>
