<!DOCTYPE html>
<html lang="pt-ao" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Imóvel | Angola Imóveis</title>
    
    <!-- CSS Libraries -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Photo Sphere Viewer CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core/index.min.css">
    
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .details-header {
            position: relative;
            height: 350px;
        }
        .details-img-main {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .header-actions {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            z-index: 10;
        }
        .action-circle {
            width: 45px;
            height: 45px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            border: none;
        }
        .details-content {
            background: var(--bg-dark);
            border-radius: 30px 30px 0 0;
            margin-top: -30px;
            position: relative;
            padding: 30px 20px;
            min-height: 500px;
        }
        .info-pill {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 20px;
            text-align: center;
            flex: 1;
        }
        .info-pill i { font-size: 1.5rem; color: var(--neon-lime); display: block; margin-bottom: 5px; }
        
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 20px;
        }
        .gallery-item {
            height: 80px;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
        }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        
        #viewer-360 {
            width: 100%;
            height: 300px;
            border-radius: 20px;
            margin-top: 20px;
            display: none;
        }
        .btn-360-toggle {
            background: var(--neon-lime);
            color: #000;
            border-radius: 20px;
            padding: 5px 15px;
            font-size: 0.8rem;
            font-weight: bold;
            position: absolute;
            bottom: 50px;
            right: 20px;
        }
        .sticky-bottom-contact {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 500px;
            background: rgba(11, 11, 11, 0.9);
            backdrop-filter: blur(15px);
            padding: 20px;
            border-top: 1px solid #222;
            display: flex;
            gap: 15px;
            z-index: 100;
        }
    </style>
</head>
<body class="bg-dark">

    <div class="container-mobile pb-5">
        
        <!-- Header Image -->
        <div class="details-header" id="headerContainer">
            <div class="header-actions">
                <a href="../index.html" class="action-circle">
                    <i class="bi bi-chevron-left"></i>
                </a>
                <div class="d-flex gap-2">
                    <button class="action-circle"><i class="bi bi-share"></i></button>
                    <button class="action-circle"><i class="bi bi-heart"></i></button>
                </div>
            </div>
            <img id="mainImage" src="" class="details-img-main" alt="Imóvel">
            <button id="btn360View" class="btn-360-toggle d-none">
                <i class="bi bi-view-360 me-1"></i> VER 360°
            </button>
        </div>

        <!-- Content -->
        <div class="details-content">
            <div class="d-flex justify-content-between align-items-start mb-3">
                <div>
                    <h2 id="propTitle" class="fw-bold mb-1">...</h2>
                    <p class="text-secondary"><i class="bi bi-geo-alt"></i> <span id="propLocation">...</span></p>
                </div>
                <div class="text-end">
                    <h3 id="propPrice" class="text-neon fw-bold mb-0">...</h3>
                    <span class="text-secondary small">/mês</span>
                </div>
            </div>

            <!-- Specs -->
            <div class="d-flex gap-3 mb-4">
                <div class="info-pill">
                    <i class="bi bi-house-door"></i>
                    <span id="propType" class="small text-secondary">...</span>
                </div>
                <div class="info-pill">
                    <i class="bi bi-shield-check"></i>
                    <span class="small text-secondary">Verificado</span>
                </div>
                <div class="info-pill">
                    <i class="bi bi-calendar-event"></i>
                    <span id="propDate" class="small text-secondary">...</span>
                </div>
            </div>

            <h5 class="fw-bold mb-3">Descrição</h5>
            <p id="propDescription" class="text-secondary lh-lg mb-4">...</p>

            <h5 class="fw-bold mb-3">Galeria de Fotos</h5>
            <div class="gallery-grid" id="photoGallery">
                <!-- JS Carrega as thumbs aqui -->
            </div>

            <!-- 360 Viewer Container -->
            <div id="viewer-360"></div>

            <div class="mt-4 mb-5 p-3 rounded-4 bg-card d-flex align-items-center justify-content-between">
                <div class="d-flex align-items-center gap-3">
                    <div class="bg-neon rounded-circle d-flex align-items-center justify-content-center" style="width: 50px; height: 50px; background: var(--neon-lime); color: #000;">
                        <i class="bi bi-person-fill fs-4"></i>
                    </div>
                    <div>
                        <p class="mb-0 fw-bold" id="ownerName">...</p>
                        <p class="mb-0 text-secondary small">Proprietário</p>
                    </div>
                </div>
                <a href="#" id="callBtn" class="action-circle bg-secondary bg-opacity-25">
                    <i class="bi bi-telephone-fill"></i>
                </a>
            </div>
            
            <!-- Espaço para não cobrir o botão fixo -->
            <div style="height: 100px;"></div>
        </div>

        <!-- Sticky Bottom Contact -->
        <div class="sticky-bottom-contact">
            <a href="#" id="whatsappBtn" class="btn btn-primary-neon flex-grow-1 py-3 rounded-4 fw-bold d-flex align-items-center justify-content-center gap-2">
                <i class="bi bi-whatsapp fs-5"></i> Agendar Visita
            </a>
        </div>

    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core/index.min.js"></script>
    <script src="../js/api.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const propId = urlParams.get('id');

            if (!propId) {
                window.location.href = '../index.html';
                return;
            }

            try {
                const response = await apiService.properties.getById(propId);
                if (response.success) {
                    renderDetails(response.data);
                }
            } catch (error) {
                console.error(error);
            }
        });

        function renderDetails(prop) {
            document.getElementById('propTitle').innerText = prop.title;
            document.getElementById('propLocation').innerText = prop.location;
            document.getElementById('propPrice').innerText = formatCurrency(prop.price);
            document.getElementById('propDescription').innerText = prop.description;
            document.getElementById('propType').innerText = prop.type;
            document.getElementById('ownerName').innerText = prop.owner_name;
            document.getElementById('mainImage').src = prop.main_image;
            document.getElementById('propDate').innerText = new Date(prop.created_at).toLocaleDateString('pt-AO');

            // Galeria
            const gallery = document.getElementById('photoGallery');
            const images = [prop.main_image, prop.image_1, prop.image_2, prop.image_3, prop.image_4].filter(img => img);
            
            images.forEach(img => {
                const item = document.createElement('div');
                item.className = 'gallery-item';
                item.innerHTML = `<img src="${img}" onclick="document.getElementById('mainImage').src = '${img}'">`;
                gallery.appendChild(item);
            });

            // Lógica 360°
            if (prop.is_360) {
                const btn360 = document.getElementById('btn360View');
                btn360.classList.remove('d-none');
                btn360.addEventListener('click', () => {
                    const viewerDiv = document.getElementById('viewer-360');
                    viewerDiv.style.display = 'block';
                    viewerDiv.scrollIntoView({ behavior: 'smooth' });
                    
                    new PhotoSphereViewer.Viewer({
                        container: viewerDiv,
                        panorama: prop.main_image, // Em um sistema real seria o campo is_360_image
                        navbar: ['autorotate', 'zoom', 'fullscreen']
                    });
                });
            }

            // WhatsApp Button
            const whatsappMsg = encodeURIComponent(`Olá, vi o seu anúncio do imóvel "${prop.title}" na plataforma Angola Imóveis e gostaria de mais informações.`);
            document.getElementById('whatsappBtn').href = `https://wa.me/${prop.phone_primary}?text=${whatsappMsg}`;
            document.getElementById('callBtn').href = `tel:${prop.phone_primary}`;
        }

        function formatCurrency(value) {
            return new Intl.NumberFormat('pt-AO', {
                style: 'currency',
                currency: 'AOA',
            }).format(value).replace('Kz', 'Kz ');
        }
    </script>
</body>
</html>
